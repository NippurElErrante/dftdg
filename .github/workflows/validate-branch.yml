name: Validate Cascade Order

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - alpha
      - beta
      - rc
      - rtm
      - main

jobs:
  validate-cascade-order:
    runs-on: ubuntu-latest
    steps:
      - name: Validate cascade order
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validando orden de cascade"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 Origen: $HEAD_BRANCH"
          echo "📥 Destino: $BASE_BRANCH"
          echo ""
          
          # Definir orden válido de cascade
          declare -A BRANCH_ORDER=(
            ["pre-alpha"]=1
            ["alpha"]=2
            ["beta"]=3
            ["rc"]=4
            ["rtm"]=5
            ["main"]=6
          )
          
          # Obtener posiciones
          HEAD_POS=${BRANCH_ORDER[$HEAD_BRANCH]}
          BASE_POS=${BRANCH_ORDER[$BASE_BRANCH]}
          
          # Si alguna rama no está en el orden (feature branch), permitir solo a pre-alpha
          if [[ -z "$HEAD_POS" ]]; then
            echo "ℹ️  Rama origen '$HEAD_BRANCH' no es una rama protegida"
            
            if [[ "$BASE_BRANCH" == "pre-alpha" ]]; then
              echo "✅ Feature branches deben ir a pre-alpha: CORRECTO"
              exit 0
            else
              echo "❌ ERROR: Feature branches solo pueden ir a pre-alpha"
              echo ""
              echo "👉 Cambiar el destino del PR a: pre-alpha"
              echo "   Después usar cascade merge para propagar"
              exit 1
            fi
          fi
          
          # Ambas ramas están en el orden protegido
          if [[ -n "$HEAD_POS" && -n "$BASE_POS" ]]; then
            # Calcular diferencia
            DIFF=$((BASE_POS - HEAD_POS))
            
            if [[ $DIFF -eq 1 ]]; then
              echo "✅ Orden de cascade CORRECTO"
              echo "   $HEAD_BRANCH (nivel $HEAD_POS) → $BASE_BRANCH (nivel $BASE_POS)"
              echo ""
              echo "🔄 Orden válido de cascade:"
              echo "   pre-alpha → alpha → beta → rc → rtm → main"
              exit 0
              
            elif [[ $DIFF -gt 1 ]]; then
              echo "❌ ERROR: No se puede saltar niveles en el cascade"
              echo ""
              echo "🔄 Orden correcto:"
              echo "   pre-alpha → alpha → beta → rc → rtm → main"
              echo ""
              echo "📍 Posición actual:"
              echo "   $HEAD_BRANCH está en nivel $HEAD_POS"
              echo "   $BASE_BRANCH está en nivel $BASE_POS"
              echo ""
              echo "⚠️  Estás intentando saltar $((DIFF - 1)) nivel(es)"
              echo ""
              
              # Determinar siguiente rama válida
              NEXT_POS=$((HEAD_POS + 1))
              for branch in "${!BRANCH_ORDER[@]}"; do
                if [[ ${BRANCH_ORDER[$branch]} -eq $NEXT_POS ]]; then
                  echo "👉 El siguiente nivel después de '$HEAD_BRANCH' es: '$branch'"
                  echo "   Cambia el destino del PR a: $branch"
                  break
                fi
              done
              
              exit 1
              
            else
              echo "❌ ERROR: Merge en dirección inversa no permitido"
              echo ""
              echo "🔄 El cascade solo funciona en este orden:"
              echo "   pre-alpha → alpha → beta → rc → rtm → main"
              echo ""
              echo "⚠️  No puedes hacer merge de $HEAD_BRANCH → $BASE_BRANCH"
              echo "   porque $HEAD_BRANCH viene DESPUÉS de $BASE_BRANCH"
              exit 1
            fi
          fi
          
          # Caso por defecto (no debería llegar aquí)
          echo "⚠️  No se pudo determinar el orden"
          echo "   Origen: $HEAD_BRANCH"
          echo "   Destino: $BASE_BRANCH"
          exit 0

      - name: Add comment to PR if failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Validación de Cascade Fallida
              
              Este PR no cumple con el orden de cascade requerido.
              
              ### 🔄 Orden correcto de cascade:
              \`\`\`
              pre-alpha → alpha → beta → rc → rtm → main
              \`\`\`
              
              ### 📋 Reglas:
              1. **Feature branches** → solo pueden ir a \`pre-alpha\`
              2. **Ramas protegidas** → deben seguir el orden secuencial
              3. **No se pueden saltar niveles** en el cascade
              
              ### 💡 Solución:
              - Cambia el branch destino de este PR al siguiente nivel en la cascada
              - O usa el workflow **Cascade Merge** para propagar automáticamente
              
              Revisa los logs del check \`validate-cascade-order\` para más detalles.`
            })
