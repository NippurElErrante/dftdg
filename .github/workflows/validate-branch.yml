name: Validate Cascade Order

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-cascade-order:
    runs-on: ubuntu-latest
    
    if: github.event_name == 'pull_request'
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Validate cascade order
        id: validate
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"
          
          if [[ -z "$BASE_BRANCH" || -z "$HEAD_BRANCH" ]]; then
            echo "Este workflow solo funciona en Pull Requests"
            exit 0
          fi
          
          echo "Validando orden de cascade"
          echo "Origen: $HEAD_BRANCH"
          echo "Destino: $BASE_BRANCH"
          
          declare -A BRANCH_ORDER=(
            ["pre-alpha"]=1
            ["alpha"]=2
            ["beta"]=3
            ["rc"]=4
            ["rtm"]=5
            ["main"]=6
          )
          
          HEAD_POS=${BRANCH_ORDER[$HEAD_BRANCH]}
          BASE_POS=${BRANCH_ORDER[$BASE_BRANCH]}
          
          if [[ -z "$HEAD_POS" ]]; then
            echo "Rama origen '$HEAD_BRANCH' no es una rama protegida"
            
            if [[ "$BASE_BRANCH" == "pre-alpha" ]]; then
              echo "OK: Feature branches deben ir a pre-alpha"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "ERROR: Feature branches solo pueden ir a pre-alpha"
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "error_type=wrong_target" >> $GITHUB_OUTPUT
              echo "expected_target=pre-alpha" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          if [[ -n "$HEAD_POS" && -n "$BASE_POS" ]]; then
            DIFF=$((BASE_POS - HEAD_POS))
            
            if [[ $DIFF -eq 1 ]]; then
              echo "OK: Orden de cascade correcto"
              echo "$HEAD_BRANCH (nivel $HEAD_POS) -> $BASE_BRANCH (nivel $BASE_POS)"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
              
            elif [[ $DIFF -gt 1 ]]; then
              echo "ERROR: No se puede saltar niveles en el cascade"
              echo "Intentando saltar $((DIFF - 1)) nivel(es)"
              
              NEXT_POS=$((HEAD_POS + 1))
              for branch in "${!BRANCH_ORDER[@]}"; do
                if [[ ${BRANCH_ORDER[$branch]} -eq $NEXT_POS ]]; then
                  echo "El siguiente nivel despues de '$HEAD_BRANCH' es: '$branch'"
                  echo "expected_target=$branch" >> $GITHUB_OUTPUT
                  break
                fi
              done
              
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "error_type=skipped_levels" >> $GITHUB_OUTPUT
              exit 1
              
            else
              echo "ERROR: Merge en direccion inversa no permitido"
              echo "El cascade solo funciona: pre-alpha -> alpha -> beta -> rc -> rtm -> main"
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "error_type=reverse_merge" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          echo "No se pudo determinar el orden"
          echo "status=unknown" >> $GITHUB_OUTPUT
          exit 0

      - name: Comment on PR
        if: failure() && steps.validate.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const errorType = '${{ steps.validate.outputs.error_type }}';
            const expectedTarget = '${{ steps.validate.outputs.expected_target }}';
            const headBranch = '${{ github.head_ref }}';
            const baseBranch = '${{ github.base_ref }}';
            
            let message = '';
            
            if (errorType === 'skipped_levels') {
              message = `## ❌ Error: Niveles Saltados
              
Este PR intenta saltar niveles en la cascada.

**Orden correcto:**
\`\`\`
pre-alpha → alpha → beta → rc → rtm → main
\`\`\`

**Tu PR:**
- Origen: \`${headBranch}\`
- Destino: \`${baseBranch}\`

**Solución:**
Cambia el destino del PR a: **\`${expectedTarget}\`**`;
              
            } else if (errorType === 'wrong_target') {
              message = `## ❌ Error: Destino Incorrecto
              
Los feature branches solo pueden ir a \`pre-alpha\`.

**Tu PR:**
- Origen: \`${headBranch}\`
- Destino: \`${baseBranch}\` ❌

**Solución:**
Cambia el destino del PR a: **\`pre-alpha\`**`;
              
            } else if (errorType === 'reverse_merge') {
              message = `## ❌ Error: Dirección Inversa
              
No puedes hacer merge en dirección contraria.

**Orden correcto:**
\`\`\`
pre-alpha → alpha → beta → rc → rtm → main
\`\`\`

Tu PR va en dirección contraria al flujo.`;
            }
            
            if (message) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }
