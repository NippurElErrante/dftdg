name: Validate Cascade Order

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-cascade-order:
    runs-on: ubuntu-latest
    
    # Solo ejecutar si es un Pull Request
    if: github.event_name == 'pull_request'
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Validate cascade order
        id: validate
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"
          
          # Verificar que tenemos las variables necesarias
          if [[ -z "$BASE_BRANCH" || -z "$HEAD_BRANCH" ]]; then
            echo "⚠️  Este workflow solo funciona en Pull Requests"
            echo "   BASE_BRANCH: $BASE_BRANCH"
            echo "   HEAD_BRANCH: $HEAD_BRANCH"
            exit 0
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validando orden de cascade"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 Origen: $HEAD_BRANCH"
          echo "📥 Destino: $BASE_BRANCH"
          echo ""
          
          # Definir orden válido de cascade
          declare -A BRANCH_ORDER=(
            ["pre-alpha"]=1
            ["alpha"]=2
            ["beta"]=3
            ["rc"]=4
            ["rtm"]=5
            ["main"]=6
          )
          
          # Obtener posiciones
          HEAD_POS=${BRANCH_ORDER[$HEAD_BRANCH]}
          BASE_POS=${BRANCH_ORDER[$BASE_BRANCH]}
          
          # Si alguna rama no está en el orden (feature branch), permitir solo a pre-alpha
          if [[ -z "$HEAD_POS" ]]; then
            echo "ℹ️  Rama origen '$HEAD_BRANCH' no es una rama protegida"
            
            if [[ "$BASE_BRANCH" == "pre-alpha" ]]; then
              echo "✅ Feature branches deben ir a pre-alpha: CORRECTO"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "❌ ERROR: Feature branches solo pueden ir a pre-alpha"
              echo ""
              echo "👉 Cambiar el destino del PR a: pre-alpha"
              echo "   Después usar cascade merge para propagar"
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "error_type=wrong_target" >> $GITHUB_OUTPUT
              echo "expected_target=pre-alpha" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          # Ambas ramas están en el orden protegido
          if [[ -n "$HEAD_POS" && -n "$BASE_POS" ]]; then
            # Calcular diferencia
            DIFF=$((BASE_POS - HEAD_POS))
            
            if [[ $DIFF -eq 1 ]]; then
              echo "✅ Orden de cascade CORRECTO"
              echo "   $HEAD_BRANCH (nivel $HEAD_POS) → $BASE_BRANCH (nivel $BASE_POS)"
              echo ""
              echo "🔄 Orden válido de cascade:"
              echo "   pre-alpha → alpha → beta → rc → rtm → main"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
              
            elif [[ $DIFF -gt 1 ]]; then
              echo "❌ ERROR: No se puede saltar niveles en el cascade"
              echo ""
              echo "🔄 Orden correcto:"
              echo "   pre-alpha → alpha → beta → rc → rtm → main"
              echo ""
              echo "📍 Posición actual:"
              echo "   $HEAD_BRANCH está en nivel $HEAD_POS"
              echo "   $BASE_BRANCH está en nivel $BASE_POS"
              echo ""
              echo "⚠️  Estás intentando saltar $((DIFF - 1)) nivel(es)"
              echo ""
              
              # Determinar siguiente rama válida
              NEXT_POS=$((HEAD_POS + 1))
              for branch in "${!BRANCH_ORDER[@]}"; do
                if [[ ${BRANCH_ORDER[$branch]} -eq $NEXT_POS ]]; then
                  echo "👉 El siguiente nivel después de '$HEAD_BRANCH' es: '$branch'"
                  echo "   Cambia el destino del PR a: $branch"
                  echo "expected_target=$branch" >> $GITHUB_OUTPUT
                  break
                fi
              done
              
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "error_type=skipped_levels" >> $GITHUB_OUTPUT
              exit 1
              
            else
              echo "❌ ERROR: Merge en dirección inversa no permitido"
              echo ""
              echo "🔄 El cascade solo funciona en este orden:"
              echo "   pre-alpha → alpha → beta → rc → rtm → main"
              echo ""
              echo "⚠️  No puedes hacer merge de $HEAD_BRANCH → $BASE_BRANCH"
              echo "   porque $HEAD_BRANCH viene DESPUÉS de $BASE_BRANCH"
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "error_type=reverse_merge" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          # Caso por defecto (no debería llegar aquí)
          echo "⚠️  No se pudo determinar el orden"
          echo "   Origen: $HEAD_BRANCH"
          echo "   Destino: $BASE_BRANCH"
          echo "status=unknown" >> $GITHUB_OUTPUT
          exit 0

      - name: Add comment to PR if failed
        if: failure() && steps.validate.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const errorType = '${{ steps.validate.outputs.error_type }}';
            const expectedTarget = '${{ steps.validate.outputs.expected_target }}';
            const headBranch = '${{ github.head_ref }}';
            const baseBranch = '${{ github.base_ref }}';
            
            let errorMessage = '';
            
            if (errorType === 'skipped_levels') {
              errorMessage = `## ❌ Error: Niveles Saltados en el Cascade
              
Este PR está intentando saltar niveles en la cascada.

**🔄 Orden correcto:**
\`\`\`
pre-alpha → alpha → beta → rc → rtm → main
\`\`\`

**📍 Estado actual:**
- Origen: \`${headBranch}\`
- Destino: \`${baseBranch}\`

**💡 Solución:**
El siguiente nivel después de \`${headBranch}\` es \`${expectedTarget}\`.

👉 **Cambia el destino de este PR a: \`${expectedTarget}\`**

Después puedes continuar el cascade al siguiente nivel.`;
            } else if (errorType === 'wrong_target') {
              errorMessage = `## ❌ Error: Destino Incorrecto
              
Los feature branches solo pueden ir a \`pre-alpha\`.

**📍 Estado actual:**
- Origen: \`${headBranch}\`
- Destino: \`${baseBranch}\` ❌

**💡 Solución:**
👉 **Cambia el destino de este PR a: \`pre-alpha\`**

Luego puedes usar el workflow de Cascade Merge para propagar los cambios.`;
            } else if (errorType === 'reverse_merge') {
              errorMessage = `## ❌ Error: Merge en Dirección Inversa
              
No se puede hacer merge en dirección contraria al cascade.

**🔄 Orden correcto:**
\`\`\`
pre-alpha → alpha → beta → rc → rtm → main
\`\`\`

**📍 Estado actual:**
- Intentando: \`${headBranch}\` → \`${baseBranch}\`

Esto va en dirección contraria al flujo establecido.`;
            } else {
              errorMessage = `## ❌ Validación de Cascade Fallida
              
Este PR no cumple con el orden de cascade requerido.

Revisa los logs del workflow para más detalles.`;
            }
            
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: errorMessage
              });
            } catch (error) {
              console.log('No se pudo crear el comentario:', error.message);
            }
