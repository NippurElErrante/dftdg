name: Cascade Merge

on:
  push:
    branches:
      - pre-alpha
      - alpha
      - beta
      - rc
      - rtm

  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch to start cascade from'
        required: true
        type: choice
        options:
          - pre-alpha
          - alpha
          - beta
          - rc
          - rtm
      target_branch:
        description: 'Target branch to merge into (optional, will cascade to all if empty)'
        required: false
        type: choice
        options:
          - alpha
          - beta
          - rc
          - rtm
          - main

jobs:
  cascade-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine cascade path
        id: cascade
        run: |
          # Definir el orden de las ramas
          BRANCHES=("pre-alpha" "alpha" "beta" "rc" "rtm" "main")
          
          # Determinar la rama origen
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SOURCE="${{ inputs.source_branch }}"
            TARGET="${{ inputs.target_branch }}"
          else
            SOURCE="${{ github.ref_name }}"
            TARGET=""
          fi
          
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          
          # Encontrar índice de la rama origen
          for i in "${!BRANCHES[@]}"; do
            if [[ "${BRANCHES[$i]}" == "$SOURCE" ]]; then
              START_INDEX=$((i + 1))
              break
            fi
          done
          
          # Crear lista de ramas destino
          TARGETS=()
          for ((i=$START_INDEX; i<${#BRANCHES[@]}; i++)); do
            TARGETS+=("${BRANCHES[$i]}")
            # Si se especificó un target, detenerse ahí
            if [[ "$TARGET" != "" && "${BRANCHES[$i]}" == "$TARGET" ]]; then
              break
            fi
          done
          
          echo "targets=${TARGETS[@]}" >> $GITHUB_OUTPUT

      - name: Execute cascade merge
        id: merge
        run: |
          SOURCE="${{ steps.cascade.outputs.source }}"
          TARGETS=(${{ steps.cascade.outputs.targets }})
          
          echo "🚀 Starting cascade merge from $SOURCE"
          echo "📋 Target branches: ${TARGETS[@]}"
          
          CURRENT_BRANCH="$SOURCE"
          MERGE_SUCCESS=true
          FAILED_BRANCH=""
          
          for TARGET in "${TARGETS[@]}"; do
            echo ""
            echo "═══════════════════════════════════════"
            echo "🔀 Merging $CURRENT_BRANCH → $TARGET"
            echo "═══════════════════════════════════════"
            
            # Checkout target branch
            git checkout "$TARGET"
            git pull origin "$TARGET"
            
            # Intentar merge
            if git merge "$CURRENT_BRANCH" --no-edit -m "chore: cascade merge from $CURRENT_BRANCH to $TARGET"; then
              echo "✅ Merge successful: $CURRENT_BRANCH → $TARGET"
              
              # Push changes
              if git push origin "$TARGET"; then
                echo "✅ Push successful to $TARGET"
                CURRENT_BRANCH="$TARGET"
              else
                echo "❌ Push failed to $TARGET"
                MERGE_SUCCESS=false
                FAILED_BRANCH="$TARGET"
                break
              fi
            else
              echo "❌ Merge conflict detected: $CURRENT_BRANCH → $TARGET"
              echo "🔧 Creating pull request for manual resolution..."
              
              # Abortar merge
              git merge --abort
              
              # Crear PR en lugar de merge directo
              gh pr create \
                --base "$TARGET" \
                --head "$CURRENT_BRANCH" \
                --title "🔀 Cascade merge: $CURRENT_BRANCH → $TARGET" \
                --body "⚠️ **Automatic merge failed due to conflicts**\n\nPlease resolve conflicts manually and merge this PR to continue the cascade.\n\n**Cascade path**: pre-alpha → alpha → beta → rc → rtm → main\n**Current step**: $CURRENT_BRANCH → $TARGET" \
                --label "cascade-merge,merge-conflict" || true
              
              MERGE_SUCCESS=false
              FAILED_BRANCH="$TARGET"
              break
            fi
          done
          
          if [ "$MERGE_SUCCESS" = true ]; then
            echo "merge_status=success" >> $GITHUB_OUTPUT
            echo "✅ All cascade merges completed successfully!"
          else
            echo "merge_status=failed" >> $GITHUB_OUTPUT
            echo "failed_branch=$FAILED_BRANCH" >> $GITHUB_OUTPUT
            echo "❌ Cascade stopped at $FAILED_BRANCH"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create summary
        if: always()
        run: |
          echo "## 🔀 Cascade Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Branch:** \`${{ steps.cascade.outputs.source }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target Branches:** \`${{ steps.cascade.outputs.targets }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.merge.outputs.merge_status }}" == "success" ]; then
            echo "### ✅ Status: Success" >> $GITHUB_STEP_SUMMARY
            echo "All merges completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Status: Failed" >> $GITHUB_STEP_SUMMARY
            echo "Cascade stopped at branch: \`${{ steps.merge.outputs.failed_branch }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "A pull request has been created for manual conflict resolution." >> $GITHUB_STEP_SUMMARY
          fi

