name: Cascade Merge

on:
  pull_request:
    types: [closed]
    branches:
      - alpha
      - beta
      - rc
      - rtm

permissions:
  contents: write
  pull-requests: write

jobs:
  cascade:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next branch
        id: next
        run: |
          case "${{ github.event.pull_request.base.ref }}" in
            alpha) echo "branch=beta" >> $GITHUB_OUTPUT ;;
            beta) echo "branch=rc" >> $GITHUB_OUTPUT ;;
            rc) echo "branch=rtm" >> $GITHUB_OUTPUT ;;
            rtm) echo "branch=main" >> $GITHUB_OUTPUT ;;
            *) echo "branch=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Create cascade PR
        if: steps.next.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.next.outputs.branch }}"
          BASE="${{ github.event.pull_request.base.ref }}"
          
          # Crear PR simple
          gh pr create \
            --base "$NEXT" \
            --head "$BASE" \
            --title "Cascade: $BASE → $NEXT" \
            --body "Automated cascade from $BASE" || echo "PR ya existe o no es necesario"
