name: Cascade Merge (Manual)

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Rama origen para iniciar el cascade'
        required: true
        type: choice
        options:
          - pre-alpha
          - alpha
          - beta
          - rc
          - rtm
      target_branch:
        description: 'Rama destino (vacío = cascade hasta main)'
        required: false
        type: choice
        options:
          - alpha
          - beta
          - rc
          - rtm
          - main
      create_prs:
        description: 'Crear PRs en lugar de merge directo?'
        required: true
        type: boolean
        default: true

jobs:
  cascade-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine cascade path
        id: cascade
        run: |
          BRANCHES=("pre-alpha" "alpha" "beta" "rc" "rtm" "main")
          
          SOURCE="${{ inputs.source_branch }}"
          TARGET="${{ inputs.target_branch }}"
          
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          
          # Encontrar índice de la rama origen
          for i in "${!BRANCHES[@]}"; do
            if [[ "${BRANCHES[$i]}" == "$SOURCE" ]]; then
              START_INDEX=$((i + 1))
              break
            fi
          done
          
          # Crear lista de ramas destino
          TARGETS=()
          for ((i=$START_INDEX; i<${#BRANCHES[@]}; i++)); do
            TARGETS+=("${BRANCHES[$i]}")
            if [[ "$TARGET" != "" && "${BRANCHES[$i]}" == "$TARGET" ]]; then
              break
            fi
          done
          
          echo "targets=${TARGETS[@]}" >> $GITHUB_OUTPUT
          echo "🎯 Cascade desde: $SOURCE"
          echo "📋 Hacia: ${TARGETS[@]}"

      - name: Create Pull Requests
        if: inputs.create_prs == true
        run: |
          SOURCE="${{ steps.cascade.outputs.source }}"
          TARGETS=(${{ steps.cascade.outputs.targets }})
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📝 Creando Pull Requests en cascada"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          CURRENT_BRANCH="$SOURCE"
          
          for TARGET in "${TARGETS[@]}"; do
            echo "🔀 Creando PR: $CURRENT_BRANCH → $TARGET"
            
            # Verificar si ya existe un PR abierto
            EXISTING_PR=$(gh pr list --base "$TARGET" --head "$CURRENT_BRANCH" --state open --json number --jq '.[0].number')
            
            if [[ -n "$EXISTING_PR" ]]; then
              echo "⚠️  Ya existe PR #$EXISTING_PR para $CURRENT_BRANCH → $TARGET"
            else
              # Crear PR
              PR_URL=$(gh pr create \
                --base "$TARGET" \
                --head "$CURRENT_BRANCH" \
                --title "🔀 Cascade: $CURRENT_BRANCH → $TARGET" \
                --body "## 🔄 Cascade Merge Automático

**Rama origen:** \`$CURRENT_BRANCH\`  
**Rama destino:** \`$TARGET\`

Este PR fue creado automáticamente por el workflow de cascade merge.

### 📋 Orden de cascade:
\`\`\`
pre-alpha → alpha → beta → rc → rtm → main
\`\`\`

### ✅ Checklist antes de mergear:
- [ ] Revisar cambios
- [ ] Tests pasando
- [ ] Agregar modificaciones si es necesario
- [ ] Aprobar y mergear

Después de mergear este PR, puedes continuar el cascade al siguiente nivel." \
                --label "cascade-merge") || true
              
              if [[ -n "$PR_URL" ]]; then
                echo "✅ PR creado: $PR_URL"
              else
                echo "❌ Error creando PR"
              fi
            fi
            
            echo ""
            CURRENT_BRANCH="$TARGET"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Direct Merge (sin PRs)
        if: inputs.create_prs == false
        run: |
          SOURCE="${{ steps.cascade.outputs.source }}"
          TARGETS=(${{ steps.cascade.outputs.targets }})
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔀 Ejecutando merges directos en cascada"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          CURRENT_BRANCH="$SOURCE"
          MERGE_SUCCESS=true
          FAILED_BRANCH=""
          
          for TARGET in "${TARGETS[@]}"; do
            echo "═══════════════════════════════════════"
            echo "🔀 Merging $CURRENT_BRANCH → $TARGET"
            echo "═══════════════════════════════════════"
            
            git checkout "$TARGET"
            git pull origin "$TARGET"
            
            if git merge "$CURRENT_BRANCH" --no-edit -m "chore: cascade merge from $CURRENT_BRANCH to $TARGET"; then
              echo "✅ Merge successful: $CURRENT_BRANCH → $TARGET"
              
              if git push origin "$TARGET"; then
                echo "✅ Push successful to $TARGET"
                CURRENT_BRANCH="$TARGET"
              else
                echo "❌ Push failed to $TARGET"
                MERGE_SUCCESS=false
                FAILED_BRANCH="$TARGET"
                break
              fi
            else
              echo "❌ Merge conflict detected: $CURRENT_BRANCH → $TARGET"
              git merge --abort
              MERGE_SUCCESS=false
              FAILED_BRANCH="$TARGET"
              break
            fi
            
            echo ""
          done
          
          if [ "$MERGE_SUCCESS" = false ]; then
            echo "❌ Cascade detenido en: $FAILED_BRANCH"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create summary
        if: always()
        run: |
          echo "## 🔀 Cascade Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Branch:** \`${{ steps.cascade.outputs.source }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target Branches:** \`${{ steps.cascade.outputs.targets }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ inputs.create_prs == true && 'Pull Requests' || 'Direct Merge' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ inputs.create_prs }}" == "true" ]]; then
            echo "### 📝 Pull Requests creados" >> $GITHUB_STEP_SUMMARY
            echo "Revisa la pestaña 'Pull Requests' para ver los PRs creados." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Merge directo completado" >> $GITHUB_STEP_SUMMARY
          fi
