name: Auto Cascade on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - pre-alpha
      - alpha
      - beta
      - rc
      - rtm

jobs:
  auto-cascade:
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'auto-cascade')
    
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Determine next branch in cascade
        id: cascade
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          
          echo "PR was merged to: $BASE_BRANCH"
          echo "Determining next branch in cascade..."
          
          case "$BASE_BRANCH" in
            "pre-alpha")
              NEXT_BRANCH="alpha"
              ;;
            "alpha")
              NEXT_BRANCH="beta"
              ;;
            "beta")
              NEXT_BRANCH="rc"
              ;;
            "rc")
              NEXT_BRANCH="rtm"
              ;;
            "rtm")
              NEXT_BRANCH="main"
              ;;
            *)
              echo "No cascade needed for $BASE_BRANCH"
              NEXT_BRANCH=""
              ;;
          esac
          
          echo "next_branch=$NEXT_BRANCH" >> $GITHUB_OUTPUT
          echo "source_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT
          
          if [[ -n "$NEXT_BRANCH" ]]; then
            echo "Next cascade: $BASE_BRANCH -> $NEXT_BRANCH"
          else
            echo "Cascade ends here"
          fi
          
      - name: Create cascade PR
        if: steps.cascade.outputs.next_branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SOURCE="${{ steps.cascade.outputs.source_branch }}"
          TARGET="${{ steps.cascade.outputs.next_branch }}"
          
          echo "Creating cascade PR: $SOURCE -> $TARGET"
          
          EXISTING_PR=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json number -q '.[0].number')
          
          if [[ -n "$EXISTING_PR" ]]; then
            echo "PR already exists: #$EXISTING_PR"
            echo "Adding auto-cascade label to existing PR..."
            gh pr edit "$EXISTING_PR" --add-label "auto-cascade"
            echo "Label added to PR #$EXISTING_PR"
          else
            echo "Creating new PR..."
            
            gh pr create \
              --base "$TARGET" \
              --head "$SOURCE" \
              --title "Auto-cascade: $SOURCE to $TARGET" \
              --body "Auto-cascade PR from $SOURCE to $TARGET. Triggered by PR #${{ github.event.pull_request.number }}. This PR has the auto-cascade label and will continue the cascade when merged." \
              --label "auto-cascade,automated" || echo "Warning: Could not create PR"
          fi
          
      - name: Create summary
        if: always()
        run: |
          echo "## Auto-Cascade Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: PR #${{ github.event.pull_request.number }} merged" >> $GITHUB_STEP_SUMMARY
          echo "Label: auto-cascade detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "From: ${{ steps.cascade.outputs.source_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "To: ${{ steps.cascade.outputs.next_branch }}" >> $GITHUB_STEP_SUMMARY
