name: Validar origen de merge

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

jobs:
  validar:
    runs-on: ubuntu-latest
    if: contains(fromJson('["alpha","beta","rc","rtm","main"]'), github.base_ref)

    steps:
      - name: Verificar secuencia permitida
        run: |
          TARGET="${{ github.base_ref }}"
          SOURCE="${{ github.head_ref }}"

          case "$TARGET" in
            alpha) ALLOWED="pre-alpha" ;;
            beta)  ALLOWED="alpha" ;;
            rc)    ALLOWED="beta" ;;
            rtm)   ALLOWED="rc" ;;
            main)  ALLOWED="rtm" ;;
            *)
              echo "Rama fuera de control"
              exit 0
              ;;
          esac

          if [ "$SOURCE" != "$ALLOWED" ]; then
            echo "::error::Solo se permite mergear a '$TARGET' desde '$ALLOWED'. Estás intentando desde '$SOURCE'."
            exit 1
          fi

          echo "Merge permitido: $SOURCE -> $TARGET"
